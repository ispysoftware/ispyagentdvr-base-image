# =============================================================================
# ispyagentdvr-base-image Docker Build & Publish
# =============================================================================
# Monitors jellyfin/jellyfin-ffmpeg and intel/compute-runtime for new releases.
# Builds multi-arch Docker images when either upstream has a new version.
#
# Triggers:
#   - repository_dispatch (cron-job.org external trigger)
#   - workflow_dispatch (manual)
#
# Variant built: trixie-slim-vlc-jellyfin-ffmpeg-{VER}-intel-{VER}
# Platforms: linux/amd64, linux/arm64, linux/arm/v7
# Registries: GHCR + Docker Hub
#
# Required Secrets:
#   - DOCKERHUB_USERNAME
#   - DOCKERHUB_TOKEN
# Note: GITHUB_TOKEN is automatic with packages:write
# =============================================================================

name: Docker Build & Publish - Base Image

on:
  repository_dispatch:
    types: [ispyagentdvr-base-image-build]

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - auto-check
          - build
          - promote-latest
          - force-promote-latest
          - retag-latest
          - sync-registries
        default: auto-check
      jellyfin_version:
        description: 'Override jellyfin-ffmpeg version (e.g. 7.1.3-3)'
        required: false
        type: string
      compute_version:
        description: 'Override intel compute-runtime version (e.g. 26.05.37020.3)'
        required: false
        type: string
      igc_version:
        description: 'Override IGC version (e.g. 2.28.4)'
        required: false
        type: string
      force_build:
        description: 'Force build even if tag exists'
        required: false
        type: boolean
        default: false
      tag_as_latest:
        description: 'Tag as latest after build'
        required: false
        type: boolean
        default: true
      retag_source:
        description: 'Existing tag to promote as latest, e.g. trixie-slim-vlc-jellyfin-ffmpeg-7.1.3-6-intel-25.13.33276.16 (for retag-latest action)'
        required: false
        type: string
      push_to_dockerhub:
        description: 'Push to Docker Hub'
        required: false
        type: boolean
        default: true
      push_to_ghcr:
        description: 'Push to GHCR'
        required: false
        type: boolean
        default: true
      platforms:
        description: 'Build platforms'
        required: false
        type: choice
        options:
          - 'linux/amd64,linux/arm64,linux/arm/v7'
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
        default: 'linux/amd64,linux/arm64,linux/arm/v7'
      compression_level:
        description: 'ZSTD compression level'
        required: false
        type: choice
        options: ['22', '19', '15', '10', '5', '3']
        default: '22'
      run_security_scan:
        description: 'Run Trivy security scan'
        required: false
        type: boolean
        default: true

concurrency:
  group: base-image-build-${{ github.event_name }}-${{ github.event.inputs.action || 'auto-check' }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  actions: read
  security-events: write

env:
  TZ: ${{ vars.TZ || 'Asia/Dhaka' }}
  DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO || 'mekayelanik/ispyagentdvr-base-image' }}
  GHCR_REPO: ${{ vars.GHCR_REPO || format('ghcr.io/{0}/ispyagentdvr-base-image', github.repository_owner) }}
  DEFAULT_PLATFORMS: ${{ vars.DEFAULT_PLATFORMS || 'linux/amd64,linux/arm64,linux/arm/v7' }}
  DEBIAN_BASE: ${{ vars.DEBIAN_BASE || 'trixie-slim' }}
  DEFAULT_BASE_IMAGE: ${{ vars.DEFAULT_BASE_IMAGE || format('debian:{0}', vars.DEBIAN_BASE || 'trixie-slim') }}

jobs:
  # ===========================================================================
  # Job 0: Quick upstream check
  # ===========================================================================
  quick-check:
    name: Quick Check
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    outputs:
      should_continue: ${{ steps.gate.outputs.should_continue }}
    steps:
      - name: Determine if full check needed
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.inputs.action || 'auto-check' }}
          FORCE_BUILD: ${{ github.event.inputs.force_build || 'false' }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$ACTION" != "auto-check" ]]; then
            echo "Manual action '$ACTION' — always continue"
            echo "should_continue=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$FORCE_BUILD" == "true" ]]; then
            echo "Force build — always continue"
            echo "should_continue=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Auto-check — will compare upstream versions against state"
          echo "should_continue=true" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Job 1: Check upstream releases
  # ===========================================================================
  check-releases:
    name: Check Upstream Releases
    needs: quick-check
    if: needs.quick-check.outputs.should_continue == 'true'
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: read
    outputs:
      should_build: ${{ steps.final-build-decision.outputs.should_build || steps.determine.outputs.should_build }}
      jellyfin_version: ${{ steps.determine.outputs.jellyfin_version }}
      jellyfin_major: ${{ steps.determine.outputs.jellyfin_major }}
      compute_version: ${{ steps.determine.outputs.compute_version }}
      igc_version: ${{ steps.determine.outputs.igc_version }}
      image_tag: ${{ steps.determine.outputs.image_tag }}
      date_tag: ${{ steps.determine.outputs.date_tag }}
      action_type: ${{ steps.set-action.outputs.action }}
      platforms: ${{ steps.set-platforms.outputs.platforms }}
      compression_level: ${{ steps.set-compression.outputs.level }}
      build_matrix: ${{ steps.generate-matrix.outputs.matrix }}
      latest_needs_promote: ${{ steps.determine.outputs.latest_needs_promote }}

    steps:
      - name: Set action type
        id: set-action
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "action=auto-check" >> "$GITHUB_OUTPUT"
          else
            echo "action=${{ github.event.inputs.action || 'auto-check' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set platforms
        id: set-platforms
        run: |
          PLATFORMS="${{ github.event.inputs.platforms || env.DEFAULT_PLATFORMS }}"
          echo "platforms=$PLATFORMS" >> "$GITHUB_OUTPUT"

      - name: Set compression level
        id: set-compression
        run: |
          LEVEL="${{ github.event.inputs.compression_level || '22' }}"
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq skopeo > /dev/null 2>&1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: 'false'
          setup_buildx: 'false'
          login_dockerhub: 'true'
          login_ghcr: 'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor: ${{ github.actor }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch jellyfin-ffmpeg release
        id: fetch-jellyfin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "::group::Fetching jellyfin/jellyfin-ffmpeg latest release"

          RELEASE_JSON=$(gh api repos/jellyfin/jellyfin-ffmpeg/releases/latest 2>/dev/null || echo '{}')

          if [[ "$RELEASE_JSON" == "{}" ]] || [[ "$(echo "$RELEASE_JSON" | jq -r '.tag_name // ""')" == "" ]]; then
            echo "::warning::Failed to fetch jellyfin-ffmpeg release"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "has_debs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          VERSION=$(echo "$TAG" | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d'.' -f1)

          HAS_DEBS=$(echo "$RELEASE_JSON" | jq '[.assets[].name | test("\\.deb$")] | any')

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "has_debs=$HAS_DEBS" >> "$GITHUB_OUTPUT"
          echo "Jellyfin FFmpeg: $VERSION (has .deb: $HAS_DEBS)"
          echo "::endgroup::"

      - name: Fetch intel compute-runtime release
        id: fetch-intel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "::group::Fetching intel/compute-runtime latest release"

          RELEASE_JSON=$(gh api repos/intel/compute-runtime/releases/latest 2>/dev/null || echo '{}')

          if [[ "$RELEASE_JSON" == "{}" ]] || [[ "$(echo "$RELEASE_JSON" | jq -r '.tag_name // ""')" == "" ]]; then
            echo "::warning::Failed to fetch compute-runtime release"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "igc_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          VERSION=$(echo "$TAG" | sed 's/^v//')

          BODY=$(echo "$RELEASE_JSON" | jq -r '.body // ""')
          IGC_TAG=$(echo "$BODY" | grep -oP 'intel-graphics-compiler@\Kv[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          IGC_VERSION=$(echo "$IGC_TAG" | sed 's/^v//')

          if [[ -z "$IGC_VERSION" ]]; then
            echo "::warning::Could not extract IGC version from compute-runtime release body — will use stored state if available"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "igc_version=$IGC_VERSION" >> "$GITHUB_OUTPUT"
          echo "Intel compute-runtime: $VERSION, IGC: $IGC_VERSION"
          echo "::endgroup::"

      - name: Read pipeline state
        id: read-state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "::group::Reading pipeline state"

          STATE_JSON=$(gh api "repos/${{ github.repository }}/contents/state.json?ref=pipeline-state" \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}')

          STORED_JELLYFIN=$(echo "$STATE_JSON" | jq -r '.jellyfin_version // ""')
          STORED_COMPUTE=$(echo "$STATE_JSON" | jq -r '.compute_version // ""')
          STORED_IGC=$(echo "$STATE_JSON" | jq -r '.igc_version // ""')

          echo "stored_jellyfin=$STORED_JELLYFIN" >> "$GITHUB_OUTPUT"
          echo "stored_compute=$STORED_COMPUTE" >> "$GITHUB_OUTPUT"
          echo "stored_igc=$STORED_IGC" >> "$GITHUB_OUTPUT"
          echo "State: jellyfin=$STORED_JELLYFIN compute=$STORED_COMPUTE igc=$STORED_IGC"
          echo "::endgroup::"

      - name: Determine build versions
        id: determine
        env:
          ACTION: ${{ steps.set-action.outputs.action }}
          FORCE_BUILD: ${{ github.event.inputs.force_build || 'false' }}
          UPSTREAM_JELLYFIN: ${{ steps.fetch-jellyfin.outputs.version }}
          UPSTREAM_COMPUTE: ${{ steps.fetch-intel.outputs.version }}
          UPSTREAM_IGC: ${{ steps.fetch-intel.outputs.igc_version }}
          HAS_DEBS: ${{ steps.fetch-jellyfin.outputs.has_debs }}
          STORED_JELLYFIN: ${{ steps.read-state.outputs.stored_jellyfin }}
          STORED_COMPUTE: ${{ steps.read-state.outputs.stored_compute }}
          STORED_IGC: ${{ steps.read-state.outputs.stored_igc }}
          MANUAL_JELLYFIN: ${{ github.event.inputs.jellyfin_version }}
          MANUAL_COMPUTE: ${{ github.event.inputs.compute_version }}
          MANUAL_IGC: ${{ github.event.inputs.igc_version }}
          TAG_AS_LATEST: ${{ github.event.inputs.tag_as_latest || 'true' }}
        run: |
          set -euo pipefail
          echo "::group::Determining build versions"

          DATE_TAG=$(TZ="${TZ}" date +%d%m%Y)
          SHOULD_BUILD="false"
          LATEST_NEEDS_PROMOTE="false"

          JELLYFIN_VERSION="${MANUAL_JELLYFIN:-$UPSTREAM_JELLYFIN}"
          COMPUTE_VERSION="${MANUAL_COMPUTE:-$UPSTREAM_COMPUTE}"
          IGC_VERSION="${MANUAL_IGC:-$UPSTREAM_IGC}"

          JELLYFIN_VERSION="${JELLYFIN_VERSION#v}"
          COMPUTE_VERSION="${COMPUTE_VERSION#v}"
          IGC_VERSION="${IGC_VERSION#v}"

          case "$ACTION" in
            auto-check)
              JELLYFIN_CHANGED="false"
              COMPUTE_CHANGED="false"

              if [[ -n "$JELLYFIN_VERSION" && "$JELLYFIN_VERSION" != "$STORED_JELLYFIN" && "$HAS_DEBS" == "true" ]]; then
                echo "Jellyfin FFmpeg changed: $STORED_JELLYFIN → $JELLYFIN_VERSION (has .deb files)"
                JELLYFIN_CHANGED="true"
              elif [[ "$HAS_DEBS" != "true" && -n "$JELLYFIN_VERSION" && "$JELLYFIN_VERSION" != "$STORED_JELLYFIN" ]]; then
                echo "::warning::Jellyfin FFmpeg $JELLYFIN_VERSION has no .deb files — skipping"
              fi

              if [[ -n "$COMPUTE_VERSION" && "$COMPUTE_VERSION" != "$STORED_COMPUTE" ]]; then
                echo "Intel compute-runtime changed: $STORED_COMPUTE → $COMPUTE_VERSION"
                COMPUTE_CHANGED="true"
              fi

              if [[ "$JELLYFIN_CHANGED" == "true" || "$COMPUTE_CHANGED" == "true" ]]; then
                SHOULD_BUILD="true"
              fi

              if [[ "$JELLYFIN_CHANGED" != "true" && -n "$STORED_JELLYFIN" ]]; then
                JELLYFIN_VERSION="$STORED_JELLYFIN"
              fi
              if [[ "$COMPUTE_CHANGED" != "true" && -n "$STORED_COMPUTE" ]]; then
                COMPUTE_VERSION="$STORED_COMPUTE"
              fi
              if [[ -n "$STORED_IGC" && -z "$MANUAL_IGC" && "$COMPUTE_CHANGED" != "true" ]]; then
                IGC_VERSION="$STORED_IGC"
              fi

              if [[ "$TAG_AS_LATEST" == "true" && "$SHOULD_BUILD" == "true" ]]; then
                LATEST_NEEDS_PROMOTE="true"
              elif [[ "$TAG_AS_LATEST" == "true" ]]; then
                IMAGE_TAG="${DEBIAN_BASE}-vlc-jellyfin-ffmpeg-${JELLYFIN_VERSION}-intel-${COMPUTE_VERSION}"
                GHCR_PREFIX="${{ env.GHCR_REPO }}"
                VERSION_DIGEST=$(crane digest "${GHCR_PREFIX}:${IMAGE_TAG}" 2>/dev/null || echo "none")
                LATEST_DIGEST=$(crane digest "${GHCR_PREFIX}:latest" 2>/dev/null || echo "missing")
                if [[ "$VERSION_DIGEST" != "none" && "$VERSION_DIGEST" != "$LATEST_DIGEST" ]]; then
                  LATEST_NEEDS_PROMOTE="true"
                fi
              fi
              ;;

            build)
              SHOULD_BUILD="true"
              LATEST_NEEDS_PROMOTE="true"
              ;;

            promote-latest|force-promote-latest)
              SHOULD_BUILD="false"
              LATEST_NEEDS_PROMOTE="true"
              if [[ -z "$JELLYFIN_VERSION" && -n "$STORED_JELLYFIN" ]]; then
                JELLYFIN_VERSION="$STORED_JELLYFIN"
              fi
              if [[ -z "$COMPUTE_VERSION" && -n "$STORED_COMPUTE" ]]; then
                COMPUTE_VERSION="$STORED_COMPUTE"
              fi
              if [[ -z "$IGC_VERSION" && -n "$STORED_IGC" ]]; then
                IGC_VERSION="$STORED_IGC"
              fi
              ;;

            retag-latest)
              SHOULD_BUILD="false"
              LATEST_NEEDS_PROMOTE="true"
              RETAG_SOURCE="${{ github.event.inputs.retag_source }}"
              if [[ -z "$RETAG_SOURCE" ]]; then
                echo "::error::retag-latest requires retag_source input"
                LATEST_NEEDS_PROMOTE="false"
              fi
              ;;

            sync-registries)
              SHOULD_BUILD="false"
              if [[ -z "$JELLYFIN_VERSION" && -n "$STORED_JELLYFIN" ]]; then
                JELLYFIN_VERSION="$STORED_JELLYFIN"
              fi
              if [[ -z "$COMPUTE_VERSION" && -n "$STORED_COMPUTE" ]]; then
                COMPUTE_VERSION="$STORED_COMPUTE"
              fi
              ;;
          esac

          if [[ "$FORCE_BUILD" == "true" && "$ACTION" != "promote-latest" && "$ACTION" != "force-promote-latest" && "$ACTION" != "retag-latest" && "$ACTION" != "sync-registries" ]]; then
            SHOULD_BUILD="true"
            LATEST_NEEDS_PROMOTE="true"
          fi

          if [[ "$ACTION" == "retag-latest" ]]; then
            IMAGE_TAG="${RETAG_SOURCE}"
          else
            IMAGE_TAG="${DEBIAN_BASE}-vlc-jellyfin-ffmpeg-${JELLYFIN_VERSION}-intel-${COMPUTE_VERSION}"
          fi

          if [[ "$ACTION" != "retag-latest" && ( -z "$JELLYFIN_VERSION" || -z "$COMPUTE_VERSION" || -z "$IGC_VERSION" ) ]]; then
            echo "::error::Missing required version(s): jellyfin=$JELLYFIN_VERSION compute=$COMPUTE_VERSION igc=$IGC_VERSION"
            SHOULD_BUILD="false"
          fi

          JELLYFIN_MAJOR=$(echo "$JELLYFIN_VERSION" | cut -d'.' -f1)
          JELLYFIN_MAJOR="${JELLYFIN_MAJOR:-7}"

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "jellyfin_version=$JELLYFIN_VERSION" >> "$GITHUB_OUTPUT"
          echo "jellyfin_major=$JELLYFIN_MAJOR" >> "$GITHUB_OUTPUT"
          echo "compute_version=$COMPUTE_VERSION" >> "$GITHUB_OUTPUT"
          echo "igc_version=$IGC_VERSION" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "date_tag=$DATE_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_needs_promote=$LATEST_NEEDS_PROMOTE" >> "$GITHUB_OUTPUT"

          echo "Build decision: should_build=$SHOULD_BUILD"
          echo "  jellyfin=$JELLYFIN_VERSION (major=$JELLYFIN_MAJOR)"
          echo "  compute=$COMPUTE_VERSION"
          echo "  igc=$IGC_VERSION"
          echo "  tag=$IMAGE_TAG"
          echo "  date=$DATE_TAG"
          echo "::endgroup::"

      - name: Check if tag exists in GHCR
        id: check-existing
        if: steps.determine.outputs.should_build == 'true'
        env:
          IMAGE_TAG: ${{ steps.determine.outputs.image_tag }}
          FORCE_BUILD: ${{ github.event.inputs.force_build || 'false' }}
        run: |
          set -euo pipefail
          if [[ "$FORCE_BUILD" == "true" ]]; then
            echo "Force build — skipping existence check"
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIGEST=$(crane digest "${{ env.GHCR_REPO }}:${IMAGE_TAG}" 2>/dev/null || echo "")
          if [[ -n "$DIGEST" ]]; then
            echo "::warning::Tag ${IMAGE_TAG} already exists in GHCR (digest: $DIGEST)"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${IMAGE_TAG} not found in GHCR — will build"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Final build decision
        id: final-build-decision
        if: steps.determine.outputs.should_build == 'true'
        run: |
          if [[ "${{ steps.check-existing.outputs.exists }}" == "true" && "${{ github.event.inputs.force_build || 'false' }}" != "true" ]]; then
            echo "Tag already exists and force_build not set — skipping build"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=${{ steps.determine.outputs.should_build }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build matrix
        id: generate-matrix
        env:
          PLATFORMS: ${{ steps.set-platforms.outputs.platforms }}
          SHOULD_BUILD: ${{ steps.final-build-decision.outputs.should_build || steps.determine.outputs.should_build }}
        run: |
          set -euo pipefail
          if [[ "$SHOULD_BUILD" != "true" ]]; then
            echo 'matrix=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ACTION_RUNNER="${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}"
          runner_suffix_for() {
            case "$1" in
              linux/amd64)    echo "" ;;
              linux/arm64)    echo "-arm" ;;
              linux/arm/v7)   echo "-arm" ;;
              *)              echo "" ;;
            esac
          }

          MATRIX="["
          FIRST=true
          IFS=',' read -ra PLAT_ARRAY <<< "$PLATFORMS"
          for PLAT in "${PLAT_ARRAY[@]}"; do
            PLAT=$(echo "$PLAT" | xargs)
            SLUG=$(echo "$PLAT" | sed 's|linux/||; s|/|-|g')
            SUFFIX=$(runner_suffix_for "$PLAT")
            RUNNER="${ACTION_RUNNER}${SUFFIX}"

            if [[ "$FIRST" != "true" ]]; then MATRIX+=","; fi
            MATRIX+="{\"platform\":\"$PLAT\",\"platform_slug\":\"$SLUG\",\"runner\":\"$RUNNER\"}"
            FIRST=false
          done
          MATRIX+="]"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Build matrix: $MATRIX"

  # ===========================================================================
  # Job 2: Build per-platform images
  # ===========================================================================
  build-platform:
    name: Build ${{ matrix.platform_slug }}
    needs: check-releases
    if: >-
      needs.check-releases.outputs.should_build == 'true'
      && needs.check-releases.outputs.build_matrix != '[]'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include: ${{ fromJson(needs.check-releases.outputs.build_matrix || '[]') }}

    concurrency:
      group: build-base-${{ matrix.platform_slug }}
      cancel-in-progress: false

    steps:
      - name: Free disk space
        if: matrix.platform_slug == 'amd64'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          df -h /

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: ${{ matrix.platform_slug != 'amd64' && matrix.platform_slug != 'arm64' && 'true' || 'false' }}
          setup_buildx: 'true'
          login_dockerhub: 'true'
          login_ghcr: 'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor: ${{ github.actor }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if platform tag exists
        id: check-tag
        env:
          FORCE_BUILD: ${{ github.event.inputs.force_build || 'false' }}
          GHCR_REPO: ${{ env.GHCR_REPO }}
          VERSION: ${{ needs.check-releases.outputs.image_tag }}
        run: |
          set -euo pipefail
          if [[ "$FORCE_BUILD" == "true" ]]; then
            echo "Force build — skipping existence check"
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DIGEST=$(crane digest "${GHCR_REPO}:${VERSION}" 2>/dev/null || echo "")
          if [[ -n "$DIGEST" ]]; then
            echo "::notice::Tag ${VERSION} exists on ${GHCR_REPO} — skipping platform build"
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare build data and Dockerfile
        id: prepare
        if: steps.check-tag.outputs.skip_build != 'true'
        env:
          JELLYFIN_VERSION: ${{ needs.check-releases.outputs.jellyfin_version }}
          JELLYFIN_MAJOR: ${{ needs.check-releases.outputs.jellyfin_major }}
          COMPUTE_VERSION: ${{ needs.check-releases.outputs.compute_version }}
          IGC_VERSION: ${{ needs.check-releases.outputs.igc_version }}
          IMAGE_TAG: ${{ needs.check-releases.outputs.image_tag }}
          DATE_TAG: ${{ needs.check-releases.outputs.date_tag }}
        run: |
          set -euo pipefail

          mkdir -p resources/build_data
          echo "${DEFAULT_BASE_IMAGE}" > resources/build_data/BASE_IMAGE
          echo "${JELLYFIN_VERSION}" > resources/build_data/JELLYFIN_FFMPEG_VERSION
          echo "${JELLYFIN_MAJOR}" > resources/build_data/JELLYFIN_FFMPEG_MAJOR_VERSION
          echo "${COMPUTE_VERSION}" > resources/build_data/COMPUTE_VERSION
          echo "${IGC_VERSION}" > resources/build_data/IGC_VERSION
          touch resources/build_data/vlc
          touch resources/build_data/hwaccel
          echo "Build started: $(TZ="${TZ}" date +'%Y-%m-%dT%H:%M:%S%z')" > resources/build_data/base-image-timestamp

          bash ./DockerfileModifier.sh

          PUSH_TARGETS=""
          if [[ "${{ github.event.inputs.push_to_ghcr || 'true' }}" == "true" ]]; then
            PUSH_TARGETS="${{ env.GHCR_REPO }}"
          fi
          if [[ "${{ github.event.inputs.push_to_dockerhub || 'true' }}" == "true" ]]; then
            if [[ -n "$PUSH_TARGETS" ]]; then PUSH_TARGETS="$PUSH_TARGETS,"; fi
            PUSH_TARGETS="${PUSH_TARGETS}${{ env.DOCKERHUB_REPO }}"
          fi

          echo "push_targets=$PUSH_TARGETS" >> "$GITHUB_OUTPUT"
          echo "dockerfile=Dockerfile.ispyagentdvr-base-image" >> "$GITHUB_OUTPUT"

      - name: Get base image digest
        id: base-digest
        if: steps.check-tag.outputs.skip_build != 'true'
        run: |
          BASE="${DEFAULT_BASE_IMAGE}"
          DIGEST=$(crane digest "$BASE" 2>/dev/null || echo "unknown")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Determine cache reference
        id: cache-ref
        if: steps.check-tag.outputs.skip_build != 'true'
        run: |
          SLUG="${{ matrix.platform_slug }}"
          echo "tag=buildcache-${SLUG}" >> "$GITHUB_OUTPUT"
          echo "scope=base-image-v1-${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build-push
        if: steps.check-tag.outputs.skip_build != 'true'
        uses: ./.github/actions/build-push-retry
        with:
          context: .
          file: ${{ steps.prepare.outputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ steps.prepare.outputs.push_targets }}",push-by-digest=true,name-canonical=true,push=true,compression=zstd,compression-level=${{ needs.check-releases.outputs.compression_level }},oci-mediatypes=true
          cache-from: |
            type=registry,ref=${{ env.GHCR_REPO }}:${{ steps.cache-ref.outputs.tag }}
            type=gha,scope=${{ steps.cache-ref.outputs.scope }}
          cache-to: type=gha,scope=${{ steps.cache-ref.outputs.scope }},mode=max
          provenance: mode=max
          sbom: true

      - name: Export digest
        if: steps.check-tag.outputs.skip_build != 'true'
        run: |
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build-push.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"
          echo "Exported digest: $DIGEST"

      - name: Upload digest artifact
        if: steps.check-tag.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ needs.check-releases.outputs.image_tag }}-${{ matrix.platform_slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ===========================================================================
  # Job 2b: Merge platform manifests into multi-arch image
  # ===========================================================================
  merge-manifest:
    name: Merge Manifest
    needs: [check-releases, build-platform]
    if: ${{ !cancelled() && needs.check-releases.result == 'success' && needs.check-releases.outputs.should_build == 'true' }}
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Download all digests
        id: download-digests
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ needs.check-releases.outputs.image_tag }}-*
          merge-multiple: true

      - name: Check if merge is needed
        id: check-digests
        run: |
          if [[ -d /tmp/digests ]] && ls /tmp/digests/* >/dev/null 2>&1; then
            echo "has_digests=true" >> "$GITHUB_OUTPUT"
            echo "Found digests to merge:"
            ls -la /tmp/digests/
          else
            echo "has_digests=false" >> "$GITHUB_OUTPUT"
            echo "No digests found — all builds were skipped (tags already exist)"
          fi

      - name: Checkout
        if: steps.check-digests.outputs.has_digests == 'true'
        uses: actions/checkout@v6

      - name: Setup build environment
        if: steps.check-digests.outputs.has_digests == 'true'
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: 'false'
          setup_buildx: 'true'
          login_dockerhub: 'true'
          login_ghcr: 'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor: ${{ github.actor }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        if: steps.check-digests.outputs.has_digests == 'true'
        id: tags
        env:
          IMAGE_TAG: ${{ needs.check-releases.outputs.image_tag }}
          DATE_TAG: ${{ needs.check-releases.outputs.date_tag }}
          TAG_AS_LATEST: ${{ github.event.inputs.tag_as_latest || 'true' }}
        run: |
          VERSION_TAG="${IMAGE_TAG}"
          DATED_TAG="${IMAGE_TAG}-${DATE_TAG}"

          GHCR_TAGS="${{ env.GHCR_REPO }}:${VERSION_TAG},${{ env.GHCR_REPO }}:${DATED_TAG}"
          DH_TAGS="${{ env.DOCKERHUB_REPO }}:${VERSION_TAG},${{ env.DOCKERHUB_REPO }}:${DATED_TAG}"

          if [[ "$TAG_AS_LATEST" == "true" ]]; then
            GHCR_TAGS="${GHCR_TAGS},${{ env.GHCR_REPO }}:latest"
            DH_TAGS="${DH_TAGS},${{ env.DOCKERHUB_REPO }}:latest"
          fi

          echo "ghcr_tags=$GHCR_TAGS" >> "$GITHUB_OUTPUT"
          echo "dh_tags=$DH_TAGS" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "dated_tag=$DATED_TAG" >> "$GITHUB_OUTPUT"

      - name: Create GHCR multi-arch manifest
        if: steps.check-digests.outputs.has_digests == 'true'
        run: |
          set -euo pipefail
          DIGESTS=""
          for f in /tmp/digests/*; do
            DIGESTS="$DIGESTS ${{ env.GHCR_REPO }}@sha256:$(basename $f)"
          done

          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.ghcr_tags }}"
          TAG_ARGS=""
          for TAG in "${TAGS[@]}"; do
            TAG_ARGS="$TAG_ARGS -t $TAG"
          done

          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt: Creating GHCR manifest..."
            if docker buildx imagetools create $TAG_ARGS $DIGESTS 2>&1; then
              echo "GHCR manifest created successfully"
              break
            fi
            if [[ $attempt -lt 5 ]]; then
              WAIT=$((30 * attempt))
              echo "::warning::Manifest create failed, retrying in ${WAIT}s..."
              sleep "$WAIT"
            else
              echo "::error::Failed to create GHCR manifest after 5 attempts"
              exit 1
            fi
          done

      - name: Create Docker Hub multi-arch manifest
        if: steps.check-digests.outputs.has_digests == 'true' && (github.event.inputs.push_to_dockerhub || 'true') == 'true'
        run: |
          set -euo pipefail
          SOURCE="${{ env.GHCR_REPO }}:${{ steps.tags.outputs.version_tag }}"

          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.dh_tags }}"
          TAG_ARGS=""
          for TAG in "${TAGS[@]}"; do
            TAG_ARGS="$TAG_ARGS -t $TAG"
          done

          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt: Creating Docker Hub manifest..."
            if docker buildx imagetools create $TAG_ARGS "$SOURCE" 2>&1; then
              echo "Docker Hub manifest created successfully"
              break
            fi
            if [[ $attempt -lt 5 ]]; then
              WAIT=$((30 * attempt))
              echo "::warning::Manifest create failed, retrying in ${WAIT}s..."
              sleep "$WAIT"
            else
              echo "::warning::Failed to create Docker Hub manifest after 5 attempts (non-fatal)"
            fi
          done

      - name: Run Trivy security scan
        if: steps.check-digests.outputs.has_digests == 'true' && (github.event.inputs.run_security_scan || 'true') == 'true'
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.DOCKERHUB_REPO }}:${{ steps.tags.outputs.version_tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'

      - name: Upload Trivy scan results
        if: steps.check-digests.outputs.has_digests == 'true' && (github.event.inputs.run_security_scan || 'true') == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-base-image'

  # ===========================================================================
  # Job 3: Sync registries
  # ===========================================================================
  sync-registries:
    name: Sync Registries
    needs: [check-releases, merge-manifest]
    if: >-
      always()
      && needs.check-releases.result == 'success'
      && (
        needs.check-releases.outputs.action_type == 'sync-registries'
        || (
          needs.check-releases.outputs.action_type == 'auto-check'
          && (needs.merge-manifest.result == 'success' || needs.check-releases.outputs.should_build != 'true')
        )
      )
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: 'false'
          setup_buildx: 'false'
          login_dockerhub: 'true'
          login_ghcr: 'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor: ${{ github.actor }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync tags between registries
        uses: ./.github/actions/registry-sync
        with:
          dockerhub_repo: ${{ env.DOCKERHUB_REPO }}
          ghcr_repo: ${{ env.GHCR_REPO }}
          tags: '${{ needs.check-releases.outputs.image_tag }},${{ needs.check-releases.outputs.image_tag }}-${{ needs.check-releases.outputs.date_tag }}'

  # ===========================================================================
  # Job 4: Promote to latest
  # ===========================================================================
  promote-latest:
    name: Promote Latest
    needs: [check-releases, merge-manifest]
    if: >-
      always()
      && needs.check-releases.result == 'success'
      && (
        needs.check-releases.outputs.action_type == 'promote-latest'
        || needs.check-releases.outputs.action_type == 'force-promote-latest'
        || needs.check-releases.outputs.action_type == 'retag-latest'
        || (
          needs.check-releases.outputs.action_type == 'auto-check'
          && needs.check-releases.outputs.latest_needs_promote == 'true'
          && (needs.merge-manifest.result == 'success' || needs.merge-manifest.result == 'skipped')
        )
        || (
          needs.check-releases.outputs.action_type == 'build'
          && (needs.merge-manifest.result == 'success' || needs.merge-manifest.result == 'skipped')
        )
      )
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    outputs:
      promoted_version: ${{ steps.promote.outputs.promoted_version }}
      promoted_digest: ${{ steps.promote.outputs.promoted_digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: 'false'
          setup_buildx: 'false'
          login_dockerhub: 'true'
          login_ghcr: 'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor: ${{ github.actor }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote to latest
        id: promote
        env:
          IMAGE_TAG: ${{ needs.check-releases.outputs.image_tag }}
          ACTION: ${{ needs.check-releases.outputs.action_type }}
        run: |
          set -euo pipefail
          source .github/scripts/lib-retry.sh

          GHCR_SRC="${{ env.GHCR_REPO }}:${IMAGE_TAG}"
          GHCR_DST="${{ env.GHCR_REPO }}:latest"
          DH_DST="${{ env.DOCKERHUB_REPO }}:latest"

          SRC_DIGEST=$(crane digest "$GHCR_SRC" 2>/dev/null || echo "")
          if [[ -z "$SRC_DIGEST" ]]; then
            echo "::error::Source tag ${IMAGE_TAG} not found in GHCR"
            exit 1
          fi

          LATEST_DIGEST=$(crane digest "$GHCR_DST" 2>/dev/null || echo "")
          if [[ "$SRC_DIGEST" == "$LATEST_DIGEST" && "$ACTION" != "force-promote-latest" && "$ACTION" != "retag-latest" ]]; then
            echo "Latest already points to ${IMAGE_TAG} (digest: $SRC_DIGEST) — skipping"
            echo "promoted_version=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
            echo "promoted_digest=$SRC_DIGEST" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Promoting ${IMAGE_TAG} → latest (GHCR)"
          for attempt in 1 2 3 4 5; do
            if crane copy "$GHCR_SRC" "$GHCR_DST" 2>&1; then
              echo "GHCR promotion successful"
              break
            fi
            if [[ $attempt -lt 5 ]]; then
              WAIT=$((10 * attempt))
              echo "::warning::crane copy failed, retrying in ${WAIT}s..."
              sleep "$WAIT"
            else
              echo "::error::Failed to promote to GHCR latest after 5 attempts"
              exit 1
            fi
          done

          echo "Promoting ${IMAGE_TAG} → latest (Docker Hub)"
          for attempt in 1 2 3; do
            if crane copy "$GHCR_SRC" "$DH_DST" 2>&1; then
              echo "Docker Hub promotion successful"
              break
            fi
            if [[ $attempt -lt 3 ]]; then
              WAIT=$((15 * attempt))
              echo "::warning::Docker Hub promotion failed, retrying in ${WAIT}s..."
              sleep "$WAIT"
            else
              echo "::warning::Failed to promote to Docker Hub latest (non-fatal)"
            fi
          done

          echo "promoted_version=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "promoted_digest=$SRC_DIGEST" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Job 5: Update pipeline state
  # ===========================================================================
  update-state:
    name: Update Pipeline State
    needs: [check-releases, merge-manifest]
    if: >-
      always()
      && needs.check-releases.result == 'success'
      && needs.merge-manifest.result == 'success'
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    permissions:
      contents: write

    steps:
      - name: Checkout pipeline-state branch
        uses: actions/checkout@v6
        with:
          ref: pipeline-state
          fetch-depth: 1
        continue-on-error: true

      - name: Create pipeline-state branch if needed
        run: |
          if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
            git init
            git checkout --orphan pipeline-state
            git rm -rf --ignore-unmatch . 2>/dev/null || true
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" 2>/dev/null || true
            echo "Created orphan pipeline-state branch"
          fi

      - name: Write state
        env:
          JELLYFIN_VERSION: ${{ needs.check-releases.outputs.jellyfin_version }}
          COMPUTE_VERSION: ${{ needs.check-releases.outputs.compute_version }}
          IGC_VERSION: ${{ needs.check-releases.outputs.igc_version }}
          IMAGE_TAG: ${{ needs.check-releases.outputs.image_tag }}
        run: |
          set -euo pipefail
          cat > state.json <<EOF
          {
            "jellyfin_version": "${JELLYFIN_VERSION}",
            "compute_version": "${COMPUTE_VERSION}",
            "igc_version": "${IGC_VERSION}",
            "image_tag": "${IMAGE_TAG}",
            "updated_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

          echo "${JELLYFIN_VERSION}" > jellyfin-ffmpeg-version
          echo "${COMPUTE_VERSION}" > compute-runtime-version
          echo "${IGC_VERSION}" > igc-version
          date -u +'%Y-%m-%dT%H:%M:%SZ' > last-built-time

      - name: Commit and push state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && { echo "No state changes"; exit 0; }
          git commit -m "Update pipeline state [skip ci]"
          for attempt in 1 2 3; do
            if git push origin pipeline-state 2>&1; then
              echo "State pushed successfully"
              exit 0
            fi
            git pull --rebase origin pipeline-state 2>/dev/null || true
            sleep $((5 * attempt))
          done
          echo "::warning::Failed to push pipeline state after 3 attempts"

  # ===========================================================================
  # Job 6: Update metadata on main branch
  # ===========================================================================
  update-metadata:
    name: Update Metadata
    needs: [check-releases, merge-manifest, promote-latest]
    if: >-
      always()
      && (needs.merge-manifest.result == 'success' || needs.promote-latest.result == 'success')
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update resource files
        env:
          IMAGE_TAG: ${{ needs.check-releases.outputs.image_tag }}
          JELLYFIN_VERSION: ${{ needs.check-releases.outputs.jellyfin_version }}
          COMPUTE_VERSION: ${{ needs.check-releases.outputs.compute_version }}
          IGC_VERSION: ${{ needs.check-releases.outputs.igc_version }}
        run: |
          set -euo pipefail
          mkdir -p resources/build_data

          echo "${IMAGE_TAG}" > resources/tag
          date -u +'%Y-%m-%dT%H:%M:%SZ' > resources/build-timestamp
          echo "${JELLYFIN_VERSION}" > resources/build_data/JELLYFIN_FFMPEG_VERSION
          echo "${COMPUTE_VERSION}" > resources/build_data/COMPUTE_VERSION
          echo "${IGC_VERSION}" > resources/build_data/IGC_VERSION

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/
          git diff --staged --quiet && { echo "No metadata changes"; exit 0; }
          git commit -m "Update build metadata [skip ci]"
          for attempt in 1 2 3; do
            if git push origin main 2>&1; then exit 0; fi
            git pull --rebase origin main 2>/dev/null || true
            sleep $((5 * attempt))
          done
          echo "::warning::Failed to push metadata after 3 attempts"

  # ===========================================================================
  # Job 7: Update README version
  # ===========================================================================
  update-readme-version:
    name: Update README
    needs: [check-releases, promote-latest, update-metadata]
    if: needs.promote-latest.result == 'success'
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in README
        env:
          IMAGE_TAG: ${{ needs.check-releases.outputs.image_tag }}
          JELLYFIN_VERSION: ${{ needs.check-releases.outputs.jellyfin_version }}
          COMPUTE_VERSION: ${{ needs.check-releases.outputs.compute_version }}
          IGC_VERSION: ${{ needs.check-releases.outputs.igc_version }}
        run: |
          set -euo pipefail
          if [[ ! -f README.md ]]; then
            echo "No README.md found — skipping"
            exit 0
          fi

          sed -i "s|jellyfin-ffmpeg-[0-9.]*-[0-9]*-intel-[0-9.]*|jellyfin-ffmpeg-${JELLYFIN_VERSION}-intel-${COMPUTE_VERSION}|g" README.md
          sed -i "s|IGC_VERSION=.*|IGC_VERSION=${IGC_VERSION}|g" README.md 2>/dev/null || true

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && { echo "No README changes"; exit 0; }
          git commit -m "Update README with latest versions [skip ci]"
          for attempt in 1 2 3; do
            if git push origin main 2>&1; then exit 0; fi
            git pull --rebase origin main 2>/dev/null || true
            sleep $((5 * attempt))
          done
          echo "::warning::Failed to push README after 3 attempts"

  # ===========================================================================
  # Job 8: Update Docker Hub description
  # ===========================================================================
  update-dockerhub-description:
    name: Update Docker Hub Description
    needs: [update-readme-version]
    if: always() && needs.update-readme-version.result == 'success'
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_REPO }}
          readme-filepath: ./README.md
